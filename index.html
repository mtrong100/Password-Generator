<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator & Strength Checker</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="light-mode">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow">
            <div
              class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
            >
              <h2 class="mb-0">Password Generator & Strength Checker</h2>
              <button id="themeToggle" class="btn btn-light">
                <i class="fas fa-moon"></i>
              </button>
            </div>
            <div class="card-body">
              <!-- Password Generator Section -->
              <div class="mb-4">
                <h3 class="mb-3">Password Generator</h3>
                <div class="input-group mb-3">
                  <input
                    type="text"
                    id="generatedPassword"
                    class="form-control"
                    readonly
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="copyPassword"
                  >
                    <i class="fas fa-copy"></i>
                  </button>
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="togglePassword"
                  >
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
                <div class="mb-3">
                  <label for="passwordLength" class="form-label"
                    >Password Length: <span id="lengthValue">16</span></label
                  >
                  <input
                    type="range"
                    class="form-range"
                    id="passwordLength"
                    min="8"
                    max="32"
                    value="16"
                  />
                </div>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="uppercase"
                        checked
                      />
                      <label class="form-check-label" for="uppercase"
                        >Uppercase Letters (A-Z)</label
                      >
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="lowercase"
                        checked
                      />
                      <label class="form-check-label" for="lowercase"
                        >Lowercase Letters (a-z)</label
                      >
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="numbers"
                        checked
                      />
                      <label class="form-check-label" for="numbers"
                        >Numbers (0-9)</label
                      >
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="special"
                        checked
                      />
                      <label class="form-check-label" for="special"
                        >Special Characters (!@#$%^&*)</label
                      >
                    </div>
                  </div>
                </div>
                <button class="btn btn-primary mt-3" id="generatePassword">
                  <i class="fas fa-sync-alt"></i> Generate Password
                </button>
              </div>

              <!-- Password Strength Checker Section -->
              <div>
                <h3 class="mb-3">Password Strength Checker</h3>
                <div class="input-group mb-3">
                  <input
                    type="password"
                    id="passwordInput"
                    class="form-control"
                    placeholder="Enter password to check"
                  />
                  <button
                    class="btn btn-outline-secondary"
                    type="button"
                    id="toggleCheckPassword"
                  >
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
                <div class="progress mb-2" style="height: 10px">
                  <div
                    id="strengthBar"
                    class="progress-bar"
                    role="progressbar"
                    style="width: 0%"
                  ></div>
                </div>
                <div id="strengthText" class="text-center mb-2"></div>
                <div id="suggestions" class="alert alert-info d-none"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
